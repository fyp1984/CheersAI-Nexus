spring:
  application:
    name: feedback
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${FEEDBACK_DB_URL:jdbc:postgresql://localhost:15432/nexus}
    username: ${FEEDBACK_DB_USERNAME:postgres}
    password: ${FEEDBACK_DB_PASSWORD:postgres}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_schema_history_feedback

server:
  port: ${FEEDBACK_PORT:8084}

mybatis-flex:
  mapper-locations:
    - classpath*:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true