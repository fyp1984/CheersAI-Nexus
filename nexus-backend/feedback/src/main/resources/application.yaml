# 服务器配置
server:
  port: 8080
  error:
    include-message: always  # 暴露错误消息
    include-stacktrace: always  # 暴露堆栈信息（仅测试环境用）
  servlet:
    context-path: /

# Spring配置
spring:
  # 数据库配置
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: postgres  # 替换为你的数据库用户名
    password: root123456  # 替换为你的数据库密码
  # 事务管理
  transaction:
    default-timeout: 30

# MyBatisFlex配置
mybatis-flex:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.cheersai.nexus.feedback.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 打印SQL日志，方便调试