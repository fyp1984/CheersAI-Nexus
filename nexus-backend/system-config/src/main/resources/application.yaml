spring:
  application:
    name: system-config
  datasource:
    url: ${SYSTEM_DB_URL:jdbc:postgresql://localhost:5432/cheersai}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:021003st}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true  # 强制校验（生产必须开）
    clean-disabled: true       # 禁止清空数据库（默认就是true）

mybatis-flex:
  mapper-locations:
    - classpath*:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    
server:
  port: ${SYSTEM_PORT:8086}