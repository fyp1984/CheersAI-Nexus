spring:
  application:
    name: product
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${PRODUCT_DB_URL:jdbc:postgresql://localhost:5432/cheersai}
    username: ${PRODUCT_DB_USERNAME:postgres}
    password: ${PRODUCT_DB_PASSWORD:021003st}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: ${PRODUCT_PORT:8084}

mybatis-flex:
  mapper-locations:
    - classpath*:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
