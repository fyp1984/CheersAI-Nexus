server:
  port: 8085

spring:
  application:
    name: membership
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cheersai}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:021003st}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true  # 强制校验（生产必须开）
    clean-disabled: true       # 禁止清空数据库（默认就是true）

mybatis-flex:
  mapper-locations:
    - classpath*:/mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  public-key: ${JWT_PUBLIC_KEY:}

# Inter-service communication
feedback:
  service:
    url: ${FEEDBACK_SERVICE_URL:http://localhost:8083}

# Internal service-to-service auth
internal:
  secret: ${INTERNAL_SECRET:cheersai-internal-secret-2024}
