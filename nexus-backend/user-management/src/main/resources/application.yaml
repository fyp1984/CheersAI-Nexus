spring:
  application:
    name: user
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cheersai}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:021003st}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true  # 强制校验（生产必须开）
    clean-disabled: true       # 禁止清空数据库（默认就是true）
    
server:
  port: ${USER_PORT:8082}

mybatis-flex:
  mapper-locations:
    - classpath*:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
