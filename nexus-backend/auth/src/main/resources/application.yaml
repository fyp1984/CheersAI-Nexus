spring:
  application:
    name: auth
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cheersai}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:021003st}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-flex:
  mapper-locations:
    - classpath*:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true


server:
  port: ${AUTH_PORT:8081}