spring:
  application:
    name: nexus-user

  # PostgreSQL DataSource
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nexus?sslmode=disable&serverTimezone=UTC}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

server:
  port: ${SERVER_PORT:8080}

# MyBatis-Flex
mybatis-flex:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: uuid
      logic-delete-value: deleted
      logic-not-delete-value: active

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:replace-with-a-secure-base64-secret-key-for-jwt-token}
  # Access Token: 1小时
  access-token-expiration: 3600000
  # Refresh Token: 7天
  refresh-token-expiration: 604800000
  # ID Token: 30天
  id-token-expiration: 2592000000

# Logging
logging:
  level:
    root: INFO
    com.cheersai.nexus: DEBUG
