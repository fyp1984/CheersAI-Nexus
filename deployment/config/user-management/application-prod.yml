#==============================================================================
# CheersAI-Nexus User Management Service 配置 (生产环境)
# 端口: 8083
#==============================================================================

server:
  port: 8083
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

spring:
  application:
    name: nexus-user-management
  
  # PostgreSQL 数据库配置
  datasource:
    url: jdbc:postgresql://localhost:5432/cheersai
    username: cheersai_user
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# MyBatis-Flex 配置
mybatis-flex:
  mapper:
    base-package: com.cheersai.nexus.user.mapper
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# Feign 配置
feign:
  client:
    config:
      default:
        connectTimeout: 10000
        readTimeout: 30000
  compression:
    request:
      enabled: true
    response:
      enabled: true

# JWT 配置
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000

# 内测申请审核通过后的自动开通链路
beta:
  provision:
    enabled: ${BETA_PROVISION_ENABLED:true}
    http-timeout-seconds: ${BETA_PROVISION_HTTP_TIMEOUT:15}
    sso-base-url: ${SSO_API_URL:}
    sso-owner: ${SSO_PROVISION_OWNER:CheersAI}
    sso-client-id: ${SSO_PROVISION_CLIENT_ID:${DESKTOP_SSO_CLIENT_ID:}}
    sso-client-secret: ${SSO_PROVISION_CLIENT_SECRET:${DESKTOP_SSO_CLIENT_SECRET:}}
    sso-default-role: ${SSO_PROVISION_DEFAULT_ROLE:desktop_team_admin}
    sso-signup-application: ${SSO_PROVISION_SIGNUP_APPLICATION:desktop}
    filebay-base-url: ${FILEBAY_BASE_URL:${GITEA_URL:}}
    filebay-admin-username: ${FILEBAY_ADMIN_USERNAME:}
    filebay-admin-password: ${FILEBAY_ADMIN_PASSWORD:}
    filebay-default-repo: ${FILEBAY_DEFAULT_REPO:workspace}
    filebay-default-branch: ${FILEBAY_DEFAULT_BRANCH:main}
    filebay-default-masked-dir: ${FILEBAY_DEFAULT_MASKED_DIR:masked}
  notification:
    enabled: ${BETA_NOTIFICATION_ENABLED:true}
    http-timeout-seconds: ${BETA_NOTIFICATION_HTTP_TIMEOUT:10}
    desktop-api-base-url: ${DESKTOP_API_BASE_URL:http://127.0.0.1:5001}
    inner-api-key: ${DESKTOP_INNER_API_KEY:inner-api-key}
    default-language: ${BETA_NOTIFICATION_DEFAULT_LANGUAGE:zh-Hans}
    rejected-reason: ${BETA_NOTIFICATION_REJECTED_REASON:管理员审核未通过，如需帮助请联系支持人员。}

# 日志配置
logging:
  level:
    root: INFO
    com.cheersai.nexus: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
  file:
    name: /home/nexus/logs/user-management.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
