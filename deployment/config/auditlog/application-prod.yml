#==============================================================================
# CheersAI-Nexus AuditLog Service 配置 (生产环境)
# 端口: 8087
#==============================================================================

server:
  port: 8087
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

spring:
  application:
    name: nexus-auditlog

  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${DB_NAME:cheersai}?currentSchema=${DB_SCHEMA:nexus}
    username: ${DB_USER:nexus_app}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    default-schema: ${DB_SCHEMA:nexus}
    schemas: ${DB_SCHEMA:nexus}
    validate-on-migrate: true
    clean-disabled: true

mybatis-flex:
  mapper-locations:
    - classpath*:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.cheersai.nexus: ${LOG_LEVEL:INFO}
  file:
    name: /home/nexus/logs/auditlog.log
