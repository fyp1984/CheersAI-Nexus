#==============================================================================
# CheersAI-Nexus Auth Service 配置 (生产环境)
# 端口: 8082
#==============================================================================

server:
  port: 8082
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

spring:
  application:
    name: nexus-auth
  
  # PostgreSQL 数据库配置
  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${DB_NAME:cheersai}?currentSchema=${DB_SCHEMA:nexus}
    username: ${DB_USER:nexus_app}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms
  
  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# JWT 配置
jwt:
  issuer: ${JWT_ISSUER:cheersai-nexus-uat}
  audience: ${JWT_AUDIENCE:cheersai-nexus-web}
  access-token-expiration: 3600000      # 1小时
  refresh-token-expiration: 604800000    # 7天

# 阿里云短信配置
aliyun:
  sms:
    access-key-id: ${ALIYUN_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET}
    sign-name: ${ALIYUN_SMS_SIGN_NAME}
    template-code: ${ALIYUN_SMS_TEMPLATE_CODE}

# 日志配置
logging:
  level:
    root: INFO
    com.cheersai.nexus: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
  file:
    name: /home/nexus/logs/auth.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
